name: Yocto Build — Radxa Zero Fleet

on:
  push:
    branches: [main]
    paths:
      - 'layers/**'
      - 'conf/**'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target'
        default: 'radxa-fleet-image'

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 480

    steps:
      - uses: actions/checkout@v4

      - name: Setup Yocto workspace
        run: bash scripts/setup.sh

      - name: Build image
        run: bash scripts/build.sh "${{ github.event.inputs.target || 'radxa-fleet-image' }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: radxa-fleet-image-${{ github.sha }}
          path: |
            build/tmp/deploy/images/radxa-zero/*.wic.xz
            build/tmp/deploy/images/radxa-zero/*.raucb
          retention-days: 30
