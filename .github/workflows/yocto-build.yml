name: Yocto Build — Radxa Zero Fleet

on:
  # Manual only until the build is green (avoids auto-runs touching shared state).
  # Re-enable push triggers once secrets + isolated workdir are confirmed.
  workflow_dispatch:
    inputs:
      target:
        description: 'bitbake target'
        default: 'core-image-minimal'

jobs:
  build:
    runs-on: self-hosted        # self-hosted runner on honeycomb
    timeout-minutes: 480
    env:
      # ISOLATED CI workdir — never the live /opt/yocto/radxa-fleet manual-build tree.
      # Shares sstate/downloads (set in conf/local.conf) for speed.
      YOCTO_DIR: /opt/yocto/ci-radxa
      MANGO_WPA_PSK: ${{ secrets.MANGO_WPA_PSK }}   # set: gh secret set MANGO_WPA_PSK

    steps:
      - uses: actions/checkout@v4

      - name: Setup Yocto workspace
        run: bash scripts/setup.sh

      - name: Build image
        run: bash scripts/build.sh "${{ github.event.inputs.target || 'core-image-minimal' }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: radxa-fleet-image-${{ github.sha }}
          path: |
            ${{ env.YOCTO_DIR }}/build/tmp/deploy/images/radxa-zero/*.wic.bz2
            ${{ env.YOCTO_DIR }}/build/tmp/deploy/images/radxa-zero/*.raucb
          retention-days: 30
