MACHINE = "radxa-zero"
DISTRO = "poky"
PACKAGE_CLASSES = "package_rpm"

# Parallelism — honeycomb has 16 cores
BB_NUMBER_THREADS = "16"
PARALLEL_MAKE = "-j16"

# Downloads/sstate cache shared with clearfog build
DL_DIR = "/opt/yocto/downloads"
SSTATE_DIR = "/opt/yocto/sstate-cache"

# RAUC
DISTRO_FEATURES:append = " rauc"
RAUC_KEYRING_FILE = "${TOPDIR}/../certs/ca.cert.pem"
RAUC_SIGNING_KEYFILE = "${TOPDIR}/../certs/signing.key.pem"
RAUC_SIGNING_CERTFILE = "${TOPDIR}/../certs/signing.cert.pem"

# Image features
IMAGE_FEATURES:append = " ssh-server-openssh"
EXTRA_IMAGE_FEATURES = "debug-tweaks"

# Timezone
DEFAULT_TIMEZONE = "America/Los_Angeles"
